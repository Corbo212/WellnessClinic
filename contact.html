  <header><p>Contact Information</p></header>
  <main class="container maincontent">
	  <section>
	    <p class="contact">Our Clinic is located at 123 street Bigtown Il, 123456<br>
	      Phone - 123-456-7890<br>
	      Email - Wellness@mail.com</p>
	    <p class="contact">or you may contact us with this form&nbsp;</p>
	  </section>
	  <section>
		  <form>
	    <p>
		  <label for="firstname">First Name:</label>
		  <input name="firstname" type="text" required="required" id="firstname">
	    </p>
	    <p>
          <label for="lastname">Last Name:</label>
          <input name="lastname" type="text" required="required" id="lastname">
        </p>
	    <p>
          <label for="email">Email:</label>
          <input name="email" type="email" required="required" id="email">
        </p>
		<p>
		  <label for="phone">Phone:</label>
		  <input name="phone" type="phone" required="required">
		</p>
		<p>
	    <p><label for="message">Message:</label></p>
        <textarea name="message" required="required" class="container form-control" id="message" type="message"></textarea>
		</p>
	    <p>
	    <input type="submit"> <input type="reset">
	    </p>
	    </form>
	  </section>
